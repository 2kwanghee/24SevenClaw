name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: GPT Code Review
    runs-on: ubuntu-latest
    # ralph/* 브랜치에서 온 PR만 자동 리뷰
    if: startsWith(github.head_ref, 'ralph/')

    permissions:
      contents: read
      pull-requests: write

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
          echo "DIFF_SIZE=$(wc -c < /tmp/pr.diff)" >> $GITHUB_ENV

      - name: Skip notice (no API key)
        if: env.OPENAI_API_KEY == ''
        run: echo "::notice::OPENAI_API_KEY 시크릿이 설정되지 않아 AI 리뷰를 건너뜁니다."

      - name: Run AI Review
        if: env.DIFF_SIZE != '0' && env.OPENAI_API_KEY != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/gpt_pr_review.py \
            --pr ${{ github.event.pull_request.number }} \
            --post-comment
