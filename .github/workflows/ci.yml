name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (pytest + ruff + mypy)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_sevenclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: 24SevenClaw-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy app/

      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_sevenclaw
        run: uv run pytest --tb=short -q --cov=app

  agent:
    name: Agent (pytest + ruff)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 24SevenClaw-agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy agent/

      - name: Test (pytest)
        run: uv run pytest --tb=short -q

  web:
    name: Web (lint + typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 24SevenClaw-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  contracts:
    name: Contracts (type validation)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 24SevenClaw-contracts

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Validate TypeScript types
        run: npx tsc --noEmit
