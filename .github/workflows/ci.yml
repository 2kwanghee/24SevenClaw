name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline-lint:
    name: Pipeline Scripts Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check shell scripts syntax
        run: |
          for f in scripts/*.sh; do
            bash -n "$f" && echo "✅ $f" || echo "❌ $f"
          done

      - name: Check Python scripts syntax
        run: |
          for f in scripts/*.py; do
            python3 -m py_compile "$f" && echo "✅ $f" || echo "❌ $f"
          done

      - name: Validate docs exist
        run: |
          test -f CLAUDE.md && echo "✅ CLAUDE.md"
          test -f PjPlan.md && echo "✅ PjPlan.md"
          test -d docs && echo "✅ docs/"
