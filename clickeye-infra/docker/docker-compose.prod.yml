# ClickEye - 프로덕션 환경
# 사용: docker compose -f docker-compose.prod.yml up -d
# 환경변수: .env.prod 또는 외부 시크릿 매니저에서 주입

services:
  db:
    image: postgres:16-alpine
    container_name: clickeye-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: always

  redis:
    image: redis:7-alpine
    container_name: clickeye-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: always

  # ── 마이그레이션 게이트 (CE-305 PR-1) ──
  # api 와 동일 이미지(동일 build)로 `alembic upgrade head`(백필 045 포함)를 1회 실행 후 종료.
  #   api 가 depends_on: migrate(service_completed_successfully) 로 완료를 기다린 뒤 기동
  #   → `docker compose -f docker-compose.prod.yml up -d` 만으로 마이그레이션 자동 적용
  #   (복제본이 있어도 one-shot 이라 1회). prod 는 profiles 미사용 → 매 up 마다 게이트 통과.
  migrate:
    build:
      context: ../../
      dockerfile: clickeye-infra/docker/Dockerfile.api
    container_name: clickeye-migrate
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    # 대형 백필 시 호스트 메모리 폭주 방지(다른 서비스와 대칭인 modest 제한).
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    restart: "no"

  api:
    build:
      # 단계6: 컨텍스트를 레포 루트로 → governance editable(path="../") 해석 가능.
      context: ../../
      dockerfile: clickeye-infra/docker/Dockerfile.api
    container_name: clickeye-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DEBUG: "false"
      # 관리형 env 파일의 컨테이너 내부 경로(PR-2~ 백엔드가 참조). 배관 단계에서 export.
      MANAGED_ENV_PATH: /app/managed/api.env
    # 관리형 env 배관(CE-305 PR-1): 관리형 파일을 env_file 로 병행 로드. 빈 배관 파일이 항상
    #   존재하므로 plain string 형식 사용(구버전 compose 호환). 기존 environment: 키는 불변
    #   — 실제 관리대상 키 이관은 PR-3(precedence 회피).
    env_file:
      - ../managed/api.env
    # 관리형 env 파일을 컨테이너 /app/managed 로 노출(MANAGED_ENV_PATH). 운영 패널(PR-2~)이 사용.
    volumes:
      - ../managed:/app/managed
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # 마이그레이션 게이트: migrate 가 성공(exit 0)해야 api 기동.
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: always
    # default(db/redis 접근) + ops-net(dockerproxy 접근, PR-2~) 겸용.
    networks:
      - default
      - ops-net

  web:
    build:
      context: ../../clickeye-web
      dockerfile: ../clickeye-infra/docker/Dockerfile.web
      # NEXT_PUBLIC_*/AUTH_URL은 빌드타임에 번들로 인라인되므로 build args로 주입
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        AUTH_URL: ${AUTH_URL}
        NEXT_PUBLIC_FEATURE_MODERNIZE_ENABLED: ${NEXT_PUBLIC_FEATURE_MODERNIZE_ENABLED:-false}
    container_name: clickeye-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}   # SSR/서버컴포넌트 fetch용
      AUTH_URL: ${AUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"                        # 프록시/ALB 뒤 forwarded host 신뢰 (로그인 필수)
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    restart: always

  # ── 운영 패널용 read-only Docker 소켓 프록시 (CE-305 PR-1) ──
  # 어떤 앱 컨테이너도 docker.sock 을 raw 로 쥐지 않는다. api 는 PR-2 부터
  #   http://dockerproxy:2375 로 read-only 조회만 수행(POST=0 → 쓰기 전면 차단).
  #   호스트/외부 포트 미노출(내부 ops-net 전용). profiles:[ops] → 기본 미기동(회귀 0·킬스위치).
  dockerproxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: clickeye-dockerproxy
    environment:
      # CONTAINERS=1 은 inspect(GET)로 컨테이너 env 를 노출할 수 있으나, ops-net internal +
      #   profile 게이트로 격리되고 최종적으로 PR-2 의 api 레이어에서 inspect env 를 스트립한다.
      CONTAINERS: "1"   # 컨테이너 목록/inspect(GET) 허용
      INFO: "1"         # /info(GET) 허용
      PING: "1"         # /_ping 허용
      VERSION: "1"      # /version 허용
      POST: "0"         # POST(쓰기) 전면 차단 — 읽기 전용 보장
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    networks:
      - ops-net
    profiles:
      - ops

networks:
  # 운영 패널 전용 내부망(CE-305): dockerproxy 는 여기에만 접속(호스트/외부 미노출).
  #   internal: true → 외부 게이트웨이 없음(소켓 프록시 격리). api 는 default+ops-net 겸용.
  ops-net:
    internal: true

volumes:
  pgdata:
  redisdata:
