# ClickEye - 로컬 개발 환경
# 기본: docker compose up -d (DB + Redis만)
# 전체: docker compose --profile full up -d (API 포함)
# Temporal: docker compose --profile temporal up -d (Temporal 서버 + UI + 워커)
#   → CE-296. temporal 프로파일은 기본 up 에 포함되지 않음(회귀 0).

services:
  db:
    image: postgres:16-alpine
    container_name: clickeye-db
    environment:
      POSTGRES_DB: clickeye
      POSTGRES_USER: clickeye
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clickeye"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clickeye-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── 마이그레이션 게이트 (CE-305 PR-1) ──
  # api 와 동일 이미지(동일 build 참조 — worker 서비스와 같은 재사용 패턴)로
  #   `alembic upgrade head`(백필 045 포함)를 1회 실행하고 종료(restart: "no").
  #   api 가 depends_on: migrate(service_completed_successfully) 로 이 완료를 기다리므로
  #   `docker compose --profile full up -d` 만으로 기동 전 마이그레이션이 자동 적용된다
  #   (복제본이 있어도 one-shot 이라 1회). profiles:[full] → 기본 `up -d` 는 db/redis 만(회귀 0).
  migrate:
    build:
      context: ../../
      dockerfile: clickeye-infra/docker/Dockerfile.api
    container_name: clickeye-migrate
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://clickeye:devpassword@db:5432/clickeye
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    profiles:
      - full

  api:
    build:
      # 단계6: 컨텍스트를 레포 루트로 → governance editable(path="../") 해석 가능.
      context: ../../
      dockerfile: clickeye-infra/docker/Dockerfile.api
    container_name: clickeye-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://clickeye:devpassword@db:5432/clickeye
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: dev-secret-key
      CORS_ORIGINS: '["http://localhost:3000"]'
      DEBUG: "true"
      # 관리형 env 파일의 컨테이너 내부 경로(PR-2~ 백엔드가 참조). 배관 단계에서 export.
      MANAGED_ENV_PATH: /app/managed/api.env
      # clickeye-llm 프록시 대상(profile llm). api·clickeye-llm 이 default 네트워크를
      #   공유하므로 서비스명으로 해석된다. profile llm 미기동 시 프록시는 503 로 degrade.
      CLICKEYE_LLM_URL: http://clickeye-llm:8100
    # 관리형 env 배관(CE-305 PR-1): 관리형 파일을 env_file 로 병행 로드. 빈 배관 파일이 항상
    #   존재하므로 plain string 형식 사용(구버전 compose 호환). 기존 environment: 키는 불변
    #   — 실제 관리대상 키 이관은 PR-3(precedence 회피).
    env_file:
      - ../managed/api.env
    # 관리형 env 파일을 컨테이너 /app/managed 로 노출(MANAGED_ENV_PATH). 운영 패널(PR-2~)이
    #   렌더/조회에 사용. PR-1 에서는 마운트 배관만.
    volumes:
      - ../managed:/app/managed
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # 마이그레이션 게이트: migrate 가 성공(exit 0)해야 api 기동.
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # default(db/redis 접근) + ops-net(dockerproxy 접근, PR-2~) 겸용.
    networks:
      - default
      - ops-net
    profiles:
      - full

  # ── Temporal 오케스트레이션 (CE-296) ──
  # 전부 profiles: [temporal] 뒤 → 기본 `docker compose up` 에서 미기동(회귀 0).
  # temporal DB 전략: 별도 컨테이너 대신 기존 `db`(postgres:16) 재사용.
  #   clickeye 유저가 POSTGRES_USER = 인스턴스 superuser 이므로 auto-setup 이
  #   temporal / temporal_visibility DB 를 자동 생성할 수 있다(추가 볼륨·컨테이너 0).
  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: clickeye-temporal
    environment:
      # postgres12 드라이버는 postgres 12+ 전체(=pg16)와 호환
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: clickeye
      POSTGRES_PWD: devpassword
      POSTGRES_SEEDS: db
      # 생성될 DB 이름 (auto-setup 이 없으면 만든다)
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports:
      - "7233:7233"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # auto-setup 이미지에 포함된 tctl 로 클러스터 헬스 확인 (순차기동용)
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    profiles:
      - temporal

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: clickeye-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      - temporal
    restart: unless-stopped
    profiles:
      - temporal

  # 워커: api 이미지를 재사용(동일 build 참조)하되 command 로 워커 엔트리 override.
  # 단계6에서 빌드 컨텍스트를 레포 루트로 올려 governance editable 을 해석하도록 수정
  #   (api 와 동일 컨텍스트/Dockerfile → 동일 이미지 레이어 캐시 공유). profiles 로
  #   감싸 기본 미기동(회귀 0).
  worker:
    build:
      context: ../../
      dockerfile: clickeye-infra/docker/Dockerfile.api
    container_name: clickeye-temporal-worker
    command: ["/app/.venv/bin/python", "-m", "app.temporal.worker"]
    # 워커는 api 이미지를 재사용하지만 uvicorn(:8000)을 띄우지 않으므로 api 의
    #   HEALTHCHECK(curl :8000/health) 를 상속하면 항상 unhealthy 로 오표시된다.
    #   워커 헬스는 별도 curl 엔드포인트가 없어 disable(정상 기동은 로그로 확인).
    #   → deploy.sh status 에서 워커가 오해 없이 표시된다(다른 동작 불변).
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql+asyncpg://clickeye:devpassword@db:5432/clickeye
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: dev-secret-key
      # 워커 서비스는 켜진 상태로 기동(profiles 로 이미 게이트됨)
      FEATURE_TEMPORAL: "true"
      TEMPORAL_HOST: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: clickeye-default
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - temporal

  # ── 운영 패널용 read-only Docker 소켓 프록시 (CE-305 PR-1) ──
  # 어떤 앱 컨테이너도 docker.sock 을 raw 로 쥐지 않는다. api 는 PR-2 부터
  #   http://dockerproxy:2375 로 read-only 조회만 수행(POST=0 → 쓰기 전면 차단).
  #   호스트/외부 포트 미노출(내부 ops-net 전용). profiles:[ops] → 기본 미기동(회귀 0·킬스위치).
  dockerproxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: clickeye-dockerproxy
    environment:
      # CONTAINERS=1 은 inspect(GET)로 컨테이너 env 를 노출할 수 있으나, ops-net internal +
      #   profile 게이트로 격리되고 최종적으로 PR-2 의 api 레이어에서 inspect env 를 스트립한다.
      CONTAINERS: "1"   # 컨테이너 목록/inspect(GET) 허용
      INFO: "1"         # /info(GET) 허용
      PING: "1"         # /_ping 허용
      VERSION: "1"      # /version 허용
      POST: "0"         # POST(쓰기) 전면 차단 — 읽기 전용 보장
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - ops-net
    profiles:
      - ops

  # ── 지식축적형 sLLM (clickeye-llm P1) ──
  # 전부 profiles: [llm] 뒤 → 기본 `docker compose up` 에서 미기동(회귀 0).
  # RAG 스택: qdrant(벡터 DB) + clickeye-llm(FastAPI). LLM/임베딩은 호스트 ollama(스위처블).
  qdrant:
    image: qdrant/qdrant:latest
    container_name: clickeye-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      # qdrant 이미지에 curl/wget 이 없어 bash /dev/tcp 로 REST 포트 오픈만 확인.
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - llm

  clickeye-llm:
    build:
      # 다른 이미지와 동일하게 컨텍스트 = 레포 루트(../../).
      context: ../../
      dockerfile: clickeye-infra/docker/Dockerfile.llm
    container_name: clickeye-llm
    ports:
      - "8100:8100"
    environment:
      # ★모델 스위처블★ — 코드 변경 없이 env 로만 백엔드 교체.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      LLM_MODEL: phi3:mini
      EMBED_MODEL: nomic-embed-text
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: INFO
    # WSL/Linux 에서 컨테이너 → 호스트 ollama(11434) 접근용.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 챔피언 프롬프트 스왑 반영(P2-full): 호스트 prompts/ → 컨테이너 /app/prompts
    #   (Dockerfile.llm WORKDIR=/app, rag_prompt_path 상대 해석). 배치가 호스트에서
    #   파일 스왑 → mtime 캐시로 재기동 없이 반영.
    volumes:
      - ../../clickeye-llm/prompts:/app/prompts
    depends_on:
      # qdrant healthcheck 결합을 피해 service_started 로 완만히 대기(기동 순서만 보장).
      qdrant:
        condition: service_started
    healthcheck:
      # 슬림 이미지에 curl 이 없어 python urllib 로 /health 확인(Dockerfile HEALTHCHECK 와 동일 방식).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - llm

networks:
  # 운영 패널 전용 내부망(CE-305): dockerproxy 는 여기에만 접속(호스트/외부 미노출).
  #   internal: true → 외부 게이트웨이 없음(소켓 프록시 격리). api 는 default+ops-net 겸용.
  ops-net:
    internal: true

volumes:
  pgdata:
  redisdata:
  qdrantdata:
